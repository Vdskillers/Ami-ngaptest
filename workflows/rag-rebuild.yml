name: RAG — rebuild embeddings on chunks.json change

on:
  push:
    branches: [main]
    paths:
      - 'rag/chunks.json'
      - 'rag/build_embeddings.py'
  workflow_dispatch:   # déclenchement manuel

permissions:
  contents: write      # nécessaire pour committer rag_payload.json et le workflow patché

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: rag/requirements.txt

      - name: Install deps
        working-directory: rag
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild payload (incremental cache)
        working-directory: rag
        run: |
          python build_embeddings.py \
            --chunks chunks.json \
            --cache rag_payload.json \
            --out rag_payload.json

      - name: Patch workflow JSON
        working-directory: rag
        run: |
          python build_embeddings.py \
            --chunks chunks.json \
            --cache rag_payload.json \
            --workflow ../n8n/AI_Agent_AMI_v12_HYBRID_RAG_v1.json \
            --node-name "RAG NGAP Retriever" \
            --out ../n8n/AI_Agent_AMI_v12_HYBRID_RAG_v1.json

      - name: Commit regenerated artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add rag/rag_payload.json n8n/AI_Agent_AMI_v12_HYBRID_RAG_v1.json
          if git diff --staged --quiet; then
            echo "Rien à committer."
          else
            git commit -m "chore(rag): rebuild embeddings + patch workflow [skip ci]"
            git push
          fi

      - name: Summary
        run: |
          echo "## RAG rebuild" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          python -c "import json; p=json.load(open('rag/rag_payload.json')); print(f'n={p[\"n\"]}, dim={p[\"dim\"]}, model={p[\"model\"]}')" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Action requise** : réimporter \`n8n/AI_Agent_AMI_v12_HYBRID_RAG_v1.json\` dans N8N (aucun déploiement automatique côté N8N)." >> $GITHUB_STEP_SUMMARY
