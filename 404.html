<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b0f14">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="/Ami-ngap/index.html">
  <!-- Refresh meta : fallback si JS désactivé -->
  <meta http-equiv="refresh" content="0; url=/Ami-ngap/index.html">
  <title>AMI — Redirection</title>
  <style>
    html,body{margin:0;background:#0b0f14;color:#e8eef5;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
    .card{max-width:380px}
    h1{color:#00d4aa;font-size:28px;margin:0 0 8px;letter-spacing:.5px}
    .sub{font-size:13px;opacity:.7;margin:0 0 24px}
    p{font-size:14px;line-height:1.55;opacity:.9;margin:0 0 22px}
    a.btn{display:inline-block;background:#00d4aa;color:#0b0f14;padding:12px 22px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;box-shadow:0 4px 16px rgba(0,212,170,.25)}
    a.btn:active{transform:translateY(1px)}
    .dot{display:inline-block;width:6px;height:6px;background:#00d4aa;border-radius:50%;margin:0 3px;animation:b 1.4s infinite ease-in-out both}
    .dot:nth-child(1){animation-delay:-.32s}
    .dot:nth-child(2){animation-delay:-.16s}
    @keyframes b{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>AMI</h1>
      <div class="sub">Assistant Médical Infirmier</div>
      <p>Redirection en cours<span class="dot"></span><span class="dot"></span><span class="dot"></span><br>
      Si rien ne se passe, tape le bouton ci-dessous.</p>
      <a class="btn" href="/Ami-ngap/index.html" id="goto">Ouvrir AMI</a>
    </div>
  </div>
  <script>
    // Redirection JS robuste qui préserve le hash (#cot, #tur, etc.)
    // Cas couverts :
    //  • PWA installée pendant le custom domain → start_url cassé → tombe ici
    //  • Lien partagé pointant vers ancienne URL
    //  • Reset de site sur Chrome Android → relance sur chemin résiduel
    (function(){
      var hash   = location.hash || '';
      var search = location.search || '';
      var target = '/Ami-ngap/index.html' + search + hash;
      // Délai bref pour laisser l'utilisateur voir le branding (anti-flicker)
      setTimeout(function(){
        try { location.replace(target); }
        catch(e){ location.href = target; }
      }, 350);
      // Bouton manuel si jamais
      var btn = document.getElementById('goto');
      if(btn){ btn.href = target; }
    })();
  </script>
</body>
</html>
